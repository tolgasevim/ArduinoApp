name = "arduinoapp"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Cloudflare D1 — SQLite at the edge
# ---------------------------------------------------------------------------
# Provision once:
#   wrangler d1 create arduino-quest-db
#
# Apply migrations:
#   wrangler d1 execute arduino-quest-db \
#     --remote --file=db/migrations/0001_create_learner_progress.sql
#
# Local development (wrangler pages dev):
#   wrangler d1 execute arduino-quest-db --local \
#     --file=db/migrations/0001_create_learner_progress.sql
#   wrangler pages dev -- pnpm dev
# ---------------------------------------------------------------------------
[[d1_databases]]
binding       = "DB"
database_name = "arduino-quest-db"
database_id   = "353d325c-0aa5-46b6-9baf-589dbd6c3b58"
