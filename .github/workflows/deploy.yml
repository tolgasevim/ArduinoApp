name: Deploy to Cloudflare

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      # -----------------------------------------------------------------------
      # 1. Apply D1 migrations against the production database
      # -----------------------------------------------------------------------
      - name: Apply D1 migrations
        run: |
          npx wrangler d1 execute arduino-quest-db \
            --remote \
            --file=db/migrations/0001_create_learner_progress.sql

      # -----------------------------------------------------------------------
      # 2. Build Next.js app and transform for Cloudflare Pages
      # -----------------------------------------------------------------------
      - name: Build for Cloudflare Pages
        run: |
          pnpm build
          npx @cloudflare/next-on-pages

      # -----------------------------------------------------------------------
      # 3. Deploy Pages app (D1 binding is declared in wrangler.toml)
      # -----------------------------------------------------------------------
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy .vercel/output/static \
            --project-name=arduinoapp \
            --commit-dirty=true

      # -----------------------------------------------------------------------
      # 4. Deploy standalone health worker
      # -----------------------------------------------------------------------
      - name: Deploy health worker
        run: npx wrangler deploy --config wrangler.worker.toml
